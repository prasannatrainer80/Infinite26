<html>
    <head>
        <script>
            function show() {
                var firstName, lastName, fullName;
                firstName = frmData.firstName.value;
                lastName = frmData.lastName.value;
                fullName = firstName + " " +lastName;
                frmData.fullName.value = fullName;
            }
        </script>
    </head>
<body>
    <form name="frmData">
        <table border="3" align="center">
            <tr>
                <th colspan="2">Name Form</th>
            </tr>
            <tr>
                <th>First Name</th>
                <td>
                    <input type="text" name="firstName" placeholder="Please Enter FirstName" />
                </td>
            </tr>
            <tr>
                <th>Last Name</th>
                <td>
                    <input type="text" name="lastName" placeholder="Please Enter LastName" />
                </td>
            </tr>
            <tr>
                <th>Full Name</th>
                <td>
                    <input type="text" name="fullName" />
                </td>
            </tr>
            <tr>
                <th colspan="2">
                    <input type="button" value="Show" onclick="show()" />
                </th>
            </tr>
        </table>
    </form>
</body>
</html>
